services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulsecoach
      POSTGRES_PASSWORD: pulsecoach
      POSTGRES_DB: pulsecoach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsecoach"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://pulsecoach:pulsecoach@db:5432/pulsecoach
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ENABLE_HEVY: ${ENABLE_HEVY:-false}
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      ENABLE_COACHING: ${ENABLE_COACHING:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8010
    ports:
      - "3010:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
