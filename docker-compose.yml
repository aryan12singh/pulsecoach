services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulsecoach
      POSTGRES_PASSWORD: pulsecoach
      POSTGRES_DB: pulsecoach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsecoach"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://pulsecoach:pulsecoach@db:5432/pulsecoach
      SEED_DEMO: ${SEED_DEMO:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ENABLE_HEVY: ${ENABLE_HEVY:-false}
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      ENABLE_STRAVA: ${ENABLE_STRAVA:-false}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-http://localhost:8010/ingest/strava/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3010}
      ENABLE_COACHING: ${ENABLE_COACHING:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Empty default = the browser talks to the backend through the
        # frontend's /api proxy (same origin — works from any device without
        # a rebuild). Set to e.g. http://localhost:8010 to bypass the proxy.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      # Where the /api proxy forwards requests (server-side, read at runtime)
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      # Optional login password. Empty = no login (local use). When set, every
      # page and /api call requires signing in; also firewall or remove the
      # backend's 8010 port mapping above so the proxy is the only way in.
      APP_PASSWORD: ${APP_PASSWORD:-}
    ports:
      - "3010:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
